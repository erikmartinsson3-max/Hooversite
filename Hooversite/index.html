<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDIA_SYS</title>

  <!-- Plyr -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <!-- Monospace font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
 
  
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-logo">MEDIA_SYS</div>
    <ul class="site-nav" id="filterNav">
      <li class="active" data-filter="all">all</li>
      <li data-filter="vid">video</li>
      <li data-filter="img">photo</li>
    </ul>
    <div class="site-status">status: <span>online</span></div>
  </header>

  <!-- GALLERY -->
  <div class="section-label">// gallery index</div>
  <div class="media-grid" id="mediaGrid">

    <!--
      HOW TO ADD YOUR OWN MEDIA:
      ─────────────────────────────────────────────────────────
      For VIDEO thumbnails:
        data-type="vid"
        data-src="videos/yourfile.mp4"
        data-label="clip_01"
        data-info="1920×1080 · h.264 · 48fps"
        data-tags="tag1,tag2"
        Replace the <img> src with a thumbnail image, or remove
        the <img> tag entirely to show just the ▶ icon.

      For PHOTO thumbnails:
        data-type="img"
        data-src="photos/yourphoto.jpg"
        data-label="photo_01"
        data-info="4000×3000 · jpeg"
        data-tags="tag1,tag2"
        Replace the <img> src with a preview/thumbnail.
      ─────────────────────────────────────────────────────────
    -->

    <div class="media-thumb active"
         data-type="vid"
         data-src="videos/clip_01.mp4"
         data-label="clip_01.mp4"
         data-info="1920×1080 · h.264 · 48fps"
         data-tags="personal,2024,outdoor">
      <span class="thumb-type">vid</span>
      <!-- Replace src with your thumbnail image, or remove the <img> tag -->
      <!-- <img src="thumbnails/clip_01.jpg" alt="clip_01" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25B6;</span>
        <span class="thumb-label">clip_01</span>
      </div>
    </div>

    <div class="media-thumb"
         data-type="vid"
         data-src="videos/clip_02.mp4"
         data-label="clip_02.mp4"
         data-info="1920×1080 · h.264 · 30fps"
         data-tags="personal,2024">
      <span class="thumb-type">vid</span>
      <!-- <img src="thumbnails/clip_02.jpg" alt="clip_02" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25B6;</span>
        <span class="thumb-label">clip_02</span>
      </div>
    </div>

    <div class="media-thumb"
         data-type="img"
         data-src="photos/photo_01.jpg"
         data-label="photo_01.jpg"
         data-info="4000×3000 · jpeg"
         data-tags="travel,2023">
      <span class="thumb-type">img</span>
      <!-- <img src="photos/photo_01.jpg" alt="photo_01" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25A0;</span>
        <span class="thumb-label">photo_01</span>
      </div>
    </div>

    <div class="media-thumb"
         data-type="img"
         data-src="photos/photo_02.jpg"
         data-label="photo_02.jpg"
         data-info="3840×2160 · jpeg"
         data-tags="travel,2023">
      <span class="thumb-type">img</span>
      <!-- <img src="photos/photo_02.jpg" alt="photo_02" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25A0;</span>
        <span class="thumb-label">photo_02</span>
      </div>
    </div>

    <div class="media-thumb"
         data-type="vid"
         data-src="videos/clip_03.mp4"
         data-label="clip_03.mp4"
         data-info="1280×720 · h.264 · 24fps"
         data-tags="outdoor,2024">
      <span class="thumb-type">vid</span>
      <!-- <img src="thumbnails/clip_03.jpg" alt="clip_03" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25B6;</span>
        <span class="thumb-label">clip_03</span>
      </div>
    </div>

    <div class="media-thumb"
         data-type="img"
         data-src="photos/photo_03.jpg"
         data-label="photo_03.jpg"
         data-info="5472×3648 · jpeg"
         data-tags="personal,2024">
      <span class="thumb-type">img</span>
      <!-- <img src="photos/photo_03.jpg" alt="photo_03" /> -->
      <div class="thumb-inner">
        <span class="thumb-ascii">&#x25A0;</span>
        <span class="thumb-label">photo_03</span>
      </div>
    </div>

  </div><!-- /media-grid -->

  <!-- PLAYER -->
  <div class="section-label">// now playing</div>
  <div class="player-area">

    <!-- Video player (shown for video items) -->
    <div class="player-screen" id="playerScreen">
      <div class="scanline"></div>
      <video id="player" playsinline>
        <source src="videos/clip_01.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- Photo display (shown for image items) -->
    <div class="photo-display" id="photoDisplay">
      <div class="scanline"></div>
      <img id="photoImg" src="" alt="" />
    </div>

    <!-- Custom control bar -->
    <div class="player-bar">
      <div class="bar-top">
        <div class="bar-seg">
          <button class="ctrl-btn" id="btnRew"   aria-label="Rewind">&#x25C4;&#x25C4;</button>
          <button class="ctrl-btn play-btn" id="btnPlay" aria-label="Play">&#x25B6;</button>
          <button class="ctrl-btn" id="btnFwd"   aria-label="Skip forward">&#x25BA;&#x25BA;</button>
        </div>
        <span class="bar-div">|</span>
        <div class="bar-seg">
          <span class="time-display" id="timeDisplay">00:00 / 00:00<span class="blink">_</span></span>
        </div>
        <span class="bar-div">|</span>
        <div class="bar-seg">
          <span class="vol-display" id="volDisplay"
                title="Click to toggle mute"
                style="cursor:pointer">VOL:100</span>
        </div>
        <span class="bar-div">|</span>
        <div class="bar-seg">
          <button class="ctrl-btn" id="btnFs" aria-label="Fullscreen">&#x25A1;</button>
        </div>
        <span class="rec-indicator"><span class="blink">&#x25A0;</span> REC</span>
      </div>
      <div class="bar-bottom">
        <span class="prog-label">00:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="prog-blocks" id="progBlocks"></div>
          <div class="prog-ticks" id="progTicks"></div>
        </div>
        <span class="prog-label" id="progEnd">00:00</span>
      </div>
    </div>

  </div><!-- /player-area -->

  <!-- META -->
  <div class="meta-bar">
    <span class="meta-filename" id="metaFilename">clip_01.mp4</span>
    <span class="meta-info"     id="metaInfo">1920×1080 · h.264 · 48fps</span>
  </div>
  <div class="tag-row" id="tagRow">
    <span class="tag">personal</span>
    <span class="tag">2024</span>
    <span class="tag">outdoor</span>
  </div>

</div><!-- /shell -->

<!-- Plyr -->
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
